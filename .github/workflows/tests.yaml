name: Tests

on:
  push:
  pull_request:

permissions: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements_test.txt
      - name: Run tests
        run: pytest --tb=short
