name: Bug Report
description: Report a bug or unexpected behavior in the Sunsynk integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please follow these steps **before** submitting:

        1. **Check [Repairs](https://my.home-assistant.io/redirect/repairs/)** — the integration raises issues there automatically for auth failures and offline inverters.
        2. **Check the [Troubleshooting wiki](https://github.com/MarcinG81/SunSynk_HA_Integration/wiki/Troubleshooting)** — most common problems are documented there.
        3. **Download diagnostics** — go to **Settings → Devices & Services → Sunsynk → (⋮) → Download diagnostics** and attach the file below. It includes coordinator state, inverter data and Tariff Manager state with sensitive fields already redacted.
        4. **Enable debug logging** and include relevant log lines (see the Logs field below).

        Fill in as much detail as possible so we can reproduce and fix it quickly.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2025.5.3"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "e.g. 1.5.0"
    validations:
      required: true

  - type: dropdown
    id: api_server
    attributes:
      label: API server
      options:
        - api.sunsynk.net (Sunsynk)
        - pv.inteless.com (Deye / Inteless)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics file
      description: |
        Attach the diagnostics file downloaded from **Settings → Devices & Services → Sunsynk → (⋮) → Download diagnostics**.
        Drag and drop the `.json` file into this box, or paste its contents. Sensitive fields are already redacted automatically.

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Enable debug logging and paste relevant lines. Add this to `configuration.yaml`, restart HA, reproduce the problem, then paste the output:
        ```yaml
        logger:
          logs:
            custom_components.sunsynk: debug
        ```
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Inverter model, firmware version (`sensor.{prefix}_firmware_master_version`), number of inverters, screenshots, etc.
